<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cube Rush 3D</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0d1321;
      font-family: Inter, Arial, sans-serif;
      color: #fff;
    }
    #gameCanvas {
      width: 100%;
      height: 100%;
      touch-action: none;
      display: block;
    }
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
    #topBar {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-weight: 700;
      font-size: 18px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
    }
    #topBar > div {
      white-space: nowrap;
    }
    #hint {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      background: rgba(6, 10, 20, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 14px;
      padding: 20px 24px;
      max-width: 92vw;
      pointer-events: auto;
      backdrop-filter: blur(4px);
    }
    #hint h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }
    #hint p {
      margin: 8px 0;
      line-height: 1.4;
      opacity: 0.95;
    }
    #hint button {
      margin-top: 10px;
      border: none;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      color: #0b1220;
      background: #ffd166;
    }
    #touchControls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      display: none;
      justify-content: space-between;
      padding: 14px;
      pointer-events: auto;
      user-select: none;
    }
    .touchBtn {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 24px;
      font-weight: 800;
      display: grid;
      place-items: center;
    }
    .touchGroup {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .presetRow {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 8px 0 6px;
      pointer-events: auto;
    }
    .presetBtn {
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 800;
      cursor: pointer;
      user-select: none;
      min-width: 150px;
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
    }
    .presetBtn.selected {
      background: rgba(255, 209, 102, 0.22);
      border-color: rgba(255, 209, 102, 0.65);
      transform: translateY(-1px);
    }
    @media (max-width: 900px) {
      #touchControls { display: flex; }
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="hud">
    <div id="topBar">
      <div>Очки: <span id="score">0</span></div>
      <div>Рекорд: <span id="best">0</span></div>
      <div>Уровень: <span id="level">1</span></div>
      <div>Скорость: <span id="speed">1.0</span>x</div>
    </div>
    <div id="hint">
      <div id="panelStart">
        <h1>Cube Rush 3D</h1>
        <p>Уклоняйся от блоков, собирай шары. Есть уровни!</p>
        <div class="presetRow" aria-label="Выбор игрока">
          <button class="presetBtn selected" data-preset="0" type="button">Игрок 1: Куб</button>
          <button class="presetBtn" data-preset="1" type="button">Игрок 2: Сфера</button>
          <button class="presetBtn" data-preset="2" type="button">Игрок 3: Капсула</button>
        </div>
        <p>Управление: <b>A/D</b> или <b>←/→</b>, прыжок <b>Space</b>.</p>
        <p>На телефоне: кнопки внизу экрана.</p>
        <button id="startBtn" type="button">Старт</button>
      </div>
      <div id="panelGameOver" style="display:none">
        <h1 id="goTitle">Игра окончена</h1>
        <p>Твой счёт: <b id="goScore">0</b></p>
        <p>Рекорд: <b id="goBest">0</b></p>
        <button id="playAgainBtn" type="button">Играть снова</button>
      </div>
    </div>
    <div id="touchControls">
      <div class="touchGroup">
        <div class="touchBtn" data-key="left">◀</div>
        <div class="touchBtn" data-key="right">▶</div>
      </div>
      <div class="touchGroup">
        <div class="touchBtn" data-key="jump">▲</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script>
    (() => {
      const canvas = document.getElementById("gameCanvas");
      const scoreEl = document.getElementById("score");
      const bestEl = document.getElementById("best");
      const levelEl = document.getElementById("level");
      const speedEl = document.getElementById("speed");
      const hint = document.getElementById("hint");
      const startBtn = document.getElementById("startBtn");
      const panelStart = document.getElementById("panelStart");
      const panelGameOver = document.getElementById("panelGameOver");
      const goTitle = document.getElementById("goTitle");
      const goScore = document.getElementById("goScore");
      const goBest = document.getElementById("goBest");
      const playAgainBtn = document.getElementById("playAgainBtn");

      const presetButtons = Array.from(document.querySelectorAll(".presetBtn"));
      let selectedPresetIdx = 0;

      const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true, stencil: true });
      const scene = new BABYLON.Scene(engine);
      scene.clearColor = new BABYLON.Color4(0.05, 0.08, 0.14, 1);

      const camera = new BABYLON.ArcRotateCamera("camera", -Math.PI / 2, 1.0, 24, new BABYLON.Vector3(0, 2.2, 0), scene);
      camera.fov = 0.95;
      camera.lowerRadiusLimit = 18;
      camera.upperRadiusLimit = 26;
      camera.attachControl(canvas, true);
      camera.inputs.clear();

      const light1 = new BABYLON.HemisphericLight("hemi", new BABYLON.Vector3(0, 1, 0), scene);
      light1.intensity = 0.95;
      const light2 = new BABYLON.DirectionalLight("dir", new BABYLON.Vector3(-0.6, -1, 0.5), scene);
      light2.position = new BABYLON.Vector3(12, 20, -10);
      light2.intensity = 0.7;

      const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
      groundMat.diffuseColor = new BABYLON.Color3(0.13, 0.18, 0.28);
      groundMat.specularColor = new BABYLON.Color3(0, 0, 0);

      const laneMat = new BABYLON.StandardMaterial("laneMat", scene);
      laneMat.emissiveColor = new BABYLON.Color3(0.2, 0.45, 0.8);

      const obstacleMat = new BABYLON.StandardMaterial("obstacleMat", scene);
      obstacleMat.diffuseColor = new BABYLON.Color3(0.95, 0.22, 0.25);

      const coinMat = new BABYLON.StandardMaterial("coinMat", scene);
      coinMat.diffuseColor = new BABYLON.Color3(1.0, 0.86, 0.3);
      coinMat.emissiveColor = new BABYLON.Color3(0.25, 0.18, 0.02);

      const ground = BABYLON.MeshBuilder.CreateGround("ground", { width: 12, height: 360 }, scene);
      ground.position.z = 130;
      ground.material = groundMat;

      const lanePositions = [-3.2, 0, 3.2];
      for (let i = -12; i < 80; i++) {
        const line = BABYLON.MeshBuilder.CreateBox("line" + i, { width: 0.2, height: 0.03, depth: 1.2 }, scene);
        line.position.set(-1.6, 0.03, i * 4 + 2);
        line.material = laneMat;
        const line2 = line.clone("line2_" + i);
        line2.position.x = 1.6;
      }

      let player = null;
      let playerMat = null;
      let yFloor = 0.65;

      const shadow = BABYLON.MeshBuilder.CreateDisc("shadow", { radius: 0.9, tessellation: 32 }, scene);
      shadow.rotation.x = Math.PI / 2;
      shadow.position.y = 0.02;
      shadow.material = new BABYLON.StandardMaterial("shadowMat", scene);
      shadow.material.diffuseColor = new BABYLON.Color3(0, 0, 0);
      shadow.material.alpha = 0.25;

      const sky = BABYLON.MeshBuilder.CreateBox("sky", { size: 700 }, scene);
      const skyMat = new BABYLON.StandardMaterial("skyMat", scene);
      skyMat.backFaceCulling = false;
      skyMat.disableLighting = true;
      skyMat.emissiveColor = new BABYLON.Color3(0.05, 0.08, 0.14);
      sky.material = skyMat;

      const presets = [
        { model: "box", skinUrl: "skins/skin1.png", yFloor: 0.65, playerSize: 1.25 },
        { model: "sphere", skinUrl: "skins/skin2.png", yFloor: 0.65, playerSize: 1.25 },
        { model: "capsule", skinUrl: "skins/skin3.png", yFloor: 1.0, playerSize: 1.35 },
      ];

      function createPlayerFromPreset(presetIdx) {
        const preset = presets[presetIdx];

        if (player) player.dispose();
        if (playerMat) playerMat.dispose();

        yFloor = preset.yFloor;

        if (preset.model === "sphere") {
          player = BABYLON.MeshBuilder.CreateSphere("player", { diameter: preset.playerSize, segments: 24 }, scene);
        } else if (preset.model === "capsule") {
          player = BABYLON.MeshBuilder.CreateCapsule("player", { height: preset.playerSize * 1.08, radius: preset.playerSize * 0.42, tessellation: 24 }, scene);
        } else {
          player = BABYLON.MeshBuilder.CreateBox("player", { size: preset.playerSize }, scene);
        }

        player.position.set(0, yFloor, 2);

        // Текстура скина: подключается из файлов `skins/skin1.png..skin3.png` рядом с HTML (GitHub Pages их должен отдавать).
        playerMat = new BABYLON.StandardMaterial("playerMat_" + presetIdx, scene);
        playerMat.diffuseColor = new BABYLON.Color3(0.3, 0.9, 1.0);
        playerMat.emissiveColor = new BABYLON.Color3(0.02, 0.12, 0.16);
        try {
          const tex = new BABYLON.Texture(preset.skinUrl, scene, true, false, BABYLON.Texture.TRILINEAR_SAMPLINGMODE);
          playerMat.diffuseTexture = tex;
        } catch (e) {
          playerMat.diffuseColor = new BABYLON.Color3(0.3, 0.9, 1.0);
        }
        player.material = playerMat;
      }

      let running = false;
      let gameOver = false;
      let score = 0;
      let best = Number(localStorage.getItem("cubeRushBest") || 0);
      bestEl.textContent = String(best);

      let speed = 0.34;
      let lane = 1;
      let jumpVel = 0;
      let y = yFloor;

      const LEVELS = [
        { name: "1", travelLen: 240, speedCap: 1.05, speedGrow: 0.00028, obstacleSpawnMin: 18, obstacleSpawnMax: 30, coinSpawnMin: 42, coinSpawnMax: 74, hMin: 0.75, hMax: 1.35, obstacleColor: [0.95, 0.22, 0.25], doubleChance: 0.05, coinValue: 25, scoreMul: 1.00 },
        { name: "2", travelLen: 260, speedCap: 1.15, speedGrow: 0.00030, obstacleSpawnMin: 14, obstacleSpawnMax: 26, coinSpawnMin: 38, coinSpawnMax: 70, hMin: 0.95, hMax: 1.70, obstacleColor: [0.98, 0.36, 0.18], doubleChance: 0.12, coinValue: 30, scoreMul: 1.08 },
        { name: "3", travelLen: 280, speedCap: 1.28, speedGrow: 0.00032, obstacleSpawnMin: 12, obstacleSpawnMax: 23, coinSpawnMin: 34, coinSpawnMax: 62, hMin: 1.10, hMax: 2.10, obstacleColor: [0.92, 0.20, 0.70], doubleChance: 0.22, coinValue: 35, scoreMul: 1.18 },
        { name: "4", travelLen: 300, speedCap: 1.32, speedGrow: 0.00035, obstacleSpawnMin: 11, obstacleSpawnMax: 21, coinSpawnMin: 30, coinSpawnMax: 58, hMin: 1.25, hMax: 2.30, obstacleColor: [0.25, 0.78, 0.95], doubleChance: 0.30, coinValue: 40, scoreMul: 1.30 },
        { name: "5", travelLen: 320, speedCap: 1.35, speedGrow: 0.00036, obstacleSpawnMin: 10, obstacleSpawnMax: 20, coinSpawnMin: 28, coinSpawnMax: 54, hMin: 1.35, hMax: 2.60, obstacleColor: [1.00, 0.28, 0.10], doubleChance: 0.38, coinValue: 45, scoreMul: 1.45 },
      ];

      const levelEnds = (() => {
        const ends = [];
        let sum = 0;
        for (const l of LEVELS) { sum += l.travelLen; ends.push(sum); }
        return ends;
      })();
      let levelIndex = 0;
      let travel = 0;

      const gravity = -0.032;
      const jumpPower = 0.55;
      const obstacles = [];
      const coins = [];
      let spawnTimer = 0;
      let coinTimer = 0;

      const keys = { left: false, right: false, jump: false };

      function setLane(delta) {
        lane = Math.max(0, Math.min(2, lane + delta));
      }

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function currentLevel() {
        return LEVELS[Math.min(levelIndex, LEVELS.length - 1)];
      }

      function setLevelVisuals(idx) {
        const c = LEVELS[idx].obstacleColor;
        obstacleMat.diffuseColor = new BABYLON.Color3(c[0], c[1], c[2]);
      }

      function spawnObstacle(laneIndexOverride = null) {
        const cfg = currentLevel();
        const laneIndex = (laneIndexOverride === null) ? Math.floor(Math.random() * 3) : laneIndexOverride;
        const h = rand(cfg.hMin, cfg.hMax);
        const obstacle = BABYLON.MeshBuilder.CreateBox("obs", { width: 2.2, height: h, depth: 2.2 }, scene);
        obstacle.position.set(lanePositions[laneIndex], h / 2, 85 + Math.random() * 25);
        obstacle.material = obstacleMat;
        obstacles.push(obstacle);
      }

      function spawnCoin() {
        const laneIndex = Math.floor(Math.random() * 3);
        const coin = BABYLON.MeshBuilder.CreateSphere("coin", { diameter: 0.9, segments: 16 }, scene);
        coin.position.set(lanePositions[laneIndex], 0.95 + Math.random() * 2.0, 80 + Math.random() * 28);
        coin.material = coinMat;
        coins.push(coin);
      }

      function spawnLevelWave() {
        const cfg = currentLevel();
        const first = Math.floor(Math.random() * 3);
        spawnObstacle(first);
        if (Math.random() < cfg.doubleChance) {
          const second = (Math.random() < 0.5) ? (first + 1) % 3 : (first + 2) % 3;
          spawnObstacle(second);
        }
      }

      function resetGame() {
        running = true;
        gameOver = false;
        score = 0;
        speed = 0.34;
        lane = 1;
        jumpVel = 0;
        travel = 0;
        levelIndex = 0;
        yFloor = presets[selectedPresetIdx].yFloor;
        y = yFloor;
        setLevelVisuals(levelIndex);
        createPlayerFromPreset(selectedPresetIdx);
        player.position.set(0, y, 2);
        scoreEl.textContent = "0";
        speedEl.textContent = "1.0";
        levelEl.textContent = String(levelIndex + 1);
        spawnTimer = 0;
        coinTimer = 0;
        obstacles.splice(0).forEach(o => o.dispose());
        coins.splice(0).forEach(c => c.dispose());
      }

      function endGame(win) {
        running = false;
        gameOver = true;
        best = Math.max(best, Math.floor(score));
        localStorage.setItem("cubeRushBest", String(best));
        bestEl.textContent = String(best);

        goTitle.textContent = win ? "Победа!" : "Игра окончена";
        goScore.textContent = String(Math.floor(score));
        goBest.textContent = String(best);

        panelStart.style.display = "none";
        panelGameOver.style.display = "block";
        hint.style.display = "block";
      }

      function intersects(a, b, pad = 0.0) {
        const aa = a.getBoundingInfo().boundingBox;
        const bb = b.getBoundingInfo().boundingBox;
        return (
          aa.minimumWorld.x + pad <= bb.maximumWorld.x &&
          aa.maximumWorld.x - pad >= bb.minimumWorld.x &&
          aa.minimumWorld.y + pad <= bb.maximumWorld.y &&
          aa.maximumWorld.y - pad >= bb.minimumWorld.y &&
          aa.minimumWorld.z + pad <= bb.maximumWorld.z &&
          aa.maximumWorld.z - pad >= bb.minimumWorld.z
        );
      }

      scene.onBeforeRenderObservable.add(() => {
        // Без ограничения dt первый кадр (или возврат во вкладку) может дать гигантский шаг —
        // travel перескакивает все уровни и сразу срабатывает «Победа» и экран «Играть снова».
        const rawDt = engine.getDeltaTime() / 16.666;
        const dt = Math.min(Math.max(rawDt, 0.001), 3);

        if (!running) return;

        if (keys.left) { setLane(-1); keys.left = false; }
        if (keys.right) { setLane(1); keys.right = false; }
        if (keys.jump && y <= yFloor + 0.01) jumpVel = jumpPower;

        const targetX = lanePositions[lane];
        player.position.x += (targetX - player.position.x) * Math.min(1, 0.25 * dt);

        jumpVel += gravity * dt;
        y += jumpVel * dt;
        if (y < yFloor) { y = yFloor; jumpVel = 0; }
        player.position.y = y;
        player.rotation.z = (player.position.x - targetX) * 0.12;
        player.rotation.x += 0.03 * dt;
        shadow.position.x = player.position.x;
        shadow.scaling.x = 1 + Math.min(1.4, Math.max(0, y - yFloor)) * 0.45;
        shadow.scaling.y = shadow.scaling.x;
        shadow.material.alpha = 0.35 - Math.min(0.25, (y - yFloor) * 0.2);

        const cfgBefore = currentLevel();
        speed = Math.min(cfgBefore.speedCap, speed + cfgBefore.speedGrow * dt);
        speedEl.textContent = (speed / 0.34).toFixed(1);

        travel += speed * dt * 2.1;

        // Переход по уровням
        const prevLevel = levelIndex;
        while (levelIndex < LEVELS.length && travel >= levelEnds[levelIndex]) {
          levelIndex++;
        }
        if (levelIndex >= LEVELS.length) {
          endGame(true);
          return;
        }
        if (levelIndex !== prevLevel) {
          setLevelVisuals(levelIndex);
          // Подкидываем таймеры, чтобы новый уровень сразу ощущался
          spawnTimer = Math.min(spawnTimer, 5);
          coinTimer = Math.min(coinTimer, 5);
          levelEl.textContent = String(levelIndex + 1);
        }

        const cfg = currentLevel();
        score += 0.06 * dt * (speed * 4) * cfg.scoreMul;
        scoreEl.textContent = String(Math.floor(score));

        spawnTimer -= dt;
        coinTimer -= dt;
        if (spawnTimer <= 0) {
          spawnLevelWave();
          spawnTimer = rand(cfg.obstacleSpawnMin, cfg.obstacleSpawnMax);
        }
        if (coinTimer <= 0) {
          spawnCoin();
          coinTimer = rand(cfg.coinSpawnMin, cfg.coinSpawnMax);
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
          const o = obstacles[i];
          o.position.z -= speed * dt;
          if (intersects(player, o, 0.06)) {
            endGame(false);
            return;
          }
          if (o.position.z < -20) {
            o.dispose();
            obstacles.splice(i, 1);
          }
        }

        for (let i = coins.length - 1; i >= 0; i--) {
          const c = coins[i];
          c.position.z -= speed * dt;
          c.rotation.y += 0.1 * dt;
          if (intersects(player, c, 0.08)) {
            score += currentLevel().coinValue;
            c.dispose();
            coins.splice(i, 1);
          } else if (c.position.z < -20) {
            c.dispose();
            coins.splice(i, 1);
          }
        }

        camera.target.x = player.position.x * 0.6;
        camera.target.y = 1.8 + (y - yFloor) * 0.3;
      });

      window.addEventListener("keydown", (e) => {
        if (e.repeat) return;
        if (e.code === "ArrowLeft" || e.code === "KeyA") keys.left = true;
        if (e.code === "ArrowRight" || e.code === "KeyD") keys.right = true;
        if (e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW") keys.jump = true;
      });
      window.addEventListener("keyup", (e) => {
        if (e.code === "Space" || e.code === "ArrowUp" || e.code === "KeyW") keys.jump = false;
      });

      document.querySelectorAll(".touchBtn").forEach((btn) => {
        const key = btn.dataset.key;
        const down = (ev) => {
          ev.preventDefault();
          if (key === "left") keys.left = true;
          if (key === "right") keys.right = true;
          if (key === "jump") keys.jump = true;
        };
        const up = (ev) => {
          ev.preventDefault();
          if (key === "jump") keys.jump = false;
        };
        btn.addEventListener("pointerdown", down);
        btn.addEventListener("pointerup", up);
        btn.addEventListener("pointercancel", up);
        btn.addEventListener("pointerleave", up);
      });

      presetButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          const idx = Number(btn.dataset.preset || "0");
          selectedPresetIdx = idx;
          presetButtons.forEach(b => b.classList.remove("selected"));
          btn.classList.add("selected");
        });
      });

      startBtn.onclick = () => {
        hint.style.display = "none";
        panelStart.style.display = "block";
        panelGameOver.style.display = "none";
        resetGame();
      };

      playAgainBtn.onclick = () => {
        hint.style.display = "none";
        panelStart.style.display = "block";
        panelGameOver.style.display = "none";
        resetGame();
      };

      engine.runRenderLoop(() => scene.render());
      window.addEventListener("resize", () => engine.resize());

      // стартовый игрок (чтобы при загрузке уже был виден)
      createPlayerFromPreset(selectedPresetIdx);
      player.position.set(0, yFloor, 2);
    })();
  </script>
</body>
</html>
